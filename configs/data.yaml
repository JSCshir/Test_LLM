seed: 42
raw_corpus_path: data/raw/bible.pdf
processed_dir: data/processed
tokenizer_dir: data/tokenizer

cleaning:
  lowercase: false
  strip_extra_whitespace: true

split:
  train_ratio: 0.98

tokenizer:
  type: bpe
  bert_model_name: bert-base-uncased
  vocab_size: 8192
  special_tokens: ["<pad>", "<bos>", "<eos>", "<unk>"]

sequence:
  max_length: 256
  stride: 256
