seed: 42
device: auto

training:
  epochs: 10
  batch_size: 32
  grad_accum_steps: 1
  learning_rate: 3e-4
  weight_decay: 0.01
  grad_clip_norm: 1.0
  mixed_precision: true
  log_every_steps: 50
  eval_every_steps: 500
  save_every_steps: 500

paths:
  train_tokens: data/processed/train_tokens.bin
  val_tokens: data/processed/val_tokens.bin
  checkpoint_dir: outputs/checkpoints
  log_dir: outputs/logs
